# bellora_back — deploy no Render
# https://github.com/arandutechbr-eng/bellora_back

services:
  - type: web
    name: bellora-back
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
