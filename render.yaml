# bellora_back — deploy no Render
# Repo: github.com/arandutechbr-eng/bellora_back
# Estrutura no GitHub: backend/app/ (não back/backend/)

services:
  - type: web
    name: bellora-back
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
